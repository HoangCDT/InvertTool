name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Run Tests (Unit & Playwright E2E)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Pytest
        run: |
          pytest -v

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            # Di chuyển tới thư mục hoặc tạo mới nếu chưa tồn tại
            if [ ! -d "/root/InvertTool" ]; then
              mkdir -p /root
              cd /root
              git clone https://github.com/HoangCDT/InvertTool.git
              cd InvertTool
            else
              cd /root/InvertTool
              git pull origin master
            fi
            
            # Restart các dịch vụ bằng docker-compose
            docker-compose down
            docker-compose up --build -d
